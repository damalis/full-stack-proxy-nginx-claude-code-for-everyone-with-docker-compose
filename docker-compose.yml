services:

    claude:
        depends_on:
            ollama:
                condition: service_healthy
        image: node:latest # ubuntu:latest alpine:latest
        stdin_open: true
        tty: true
        working_dir: /workspace
        container_name: claude
        networks:
            - backend
        volumes:
            - './claude/workspace:/workspace'
            - './claude/home/node:/home/node'
        hostname: claude
        restart: unless-stopped
        ports:
            - '5173:5173'
        healthcheck:
            test: ["CMD-SHELL", "$$HOME/.local/bin/claude --version || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 100
        environment:
            ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY}'
            ANTHROPIC_BASE_URL: 'http://ollama:11434'
            ANTHROPIC_AUTH_TOKEN: 'ollama'
            __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: 'claude.${DOMAIN_NAME}'
            VITE_STRICT_PORT: true
            IS_SANDBOX: 1
            TZ: '${LOCAL_TIMEZONE}'
        command: bash -c "echo export PATH=\"$$HOME/.local/bin:$$PATH\" >> ~/.bashrc && source ~/.bashrc && curl -fsSL https://claude.ai/install.sh | bash && 
            cd /home/node && if [ -f \"/home/node/.gitignore\" ] || [ -z \"$$(ls -A /home/node)\" ]; then rm -f .gitignore && git clone https://github.com/siteboon/claudecodeui.git . && cp .env.example .env && 
            echo -e \"WORKSPACES_ROOT=/workspace\\nPORT=3000\" >> .env; else git config --global --add safe.directory /home/node && git pull origin main; fi; npm install && npm run dev"

    certbot:
        depends_on:
            proxy:
                condition: service_healthy
        image: certbot/certbot:latest
        container_name: certbot
        networks:
            - backend
        volumes:
            - 'certbot-etc:${LETSENCRYPT_CONF_PREFIX}'
            - 'certbot-var:/var/lib/letsencrypt'
            - '/tmp/acme-challenge:/tmp/acme-challenge'
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "test -d ${LETSENCRYPT_CONF_PREFIX}/live/${DOMAIN_NAME} || exit 1"]
            interval: 5s
            timeout: 5s
            retries: 20
        environment:
            TZ: '${LOCAL_TIMEZONE}'
        entrypoint: /bin/sh -c "${SSL_SNIPPET}; trap exit TERM; while :; do certbot renew --dry-run; sleep 12h & wait $${!}; done;"

    proxy:
        depends_on:
            claude:
                condition: service_healthy
        image: nginx:stable
        container_name: proxy
        networks:
            - backend
            - frontend
        volumes:
            - type: bind
              source: ./proxy/nginx.conf
              target: '${PROXY_PREFIX}/nginx.conf'
            - type: bind
              source: ./proxy/templates/proxy.conf.template
              target: '${PROXY_PREFIX}/templates/default.conf.template'
            - type: bind
              source: ./proxy/ssl-option/options-ssl-nginx-proxy.conf
              target: '${LETSENCRYPT_CONF_PREFIX}/options-ssl-nginx-proxy.conf'
            - type: bind
              source: ./ssl-proxyconf.sh
              target: '/tmp/ssl-proxyconf.sh'
            - 'certbot-etc:${LETSENCRYPT_CONF_PREFIX}'
            - '/tmp/acme-challenge:/tmp/acme-challenge'
        hostname: proxy
        restart: unless-stopped
        ports:
            - '80:80'
            - '443:443'
        healthcheck:
            test: ["CMD-SHELL", "/bin/pidof nginx > /dev/null || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 20
        environment:
            NGINX_HOST: ${DOMAIN_NAME}
            NGINX_PORT: 80
            TZ: '${LOCAL_TIMEZONE}'
        command: bash -c "/docker-entrypoint.sh nginx -v; sh /tmp/ssl-proxyconf.sh '${DOMAIN_NAME}' '${LETSENCRYPT_CONF_PREFIX}' '${PROXY_PREFIX}'"

    ollama:
        image: ollama/ollama:latest
        pull_policy: always
        tty: true
        #runtime: nvidia               
        container_name: ollama
        networks:
            - backend
        volumes:
            - 'ollama:/root/.ollama'
        hostname: ollama
        restart: unless-stopped
        ports:
            - '11434:11434'
        healthcheck:
            test: ["CMD-SHELL", "ollama", "--version || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 150
        environment:
            OLLAMA_NUM_PARALLEL: 4
            OLLAMA_MAX_LOADED_MODELS: 3
            OLLAMA_KEEP_ALIVE: '24h'
            OLLAMA_CONTEXT_LENGTH: 64000
            OLLAMA_HOST: '0.0.0.0'
            TZ: '${LOCAL_TIMEZONE}'
        #deploy:
        #    resources:
        #        reservations:
        #            devices:
        #                - driver: nvidia
        #                  count: all
        #                  capabilities: [gpu]

networks:
    backend: null
    frontend: null

volumes:
    certbot-etc:
        external: true
    certbot-var:
        name: certbot-var
    ollama:
        name: ollama-data
